<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartomancer — Draw your dungeon. One click at a time.</title>
  <meta name="description" content="Cartomancer: a browser-based RPG map editor. Draw walls, place decor, export to JSON, SVG or PNG. No install, no account.">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">

    <div id="toolbar">
      <div id="tool-group">
        <button data-tool="wall">Wall</button>
        <button data-tool="arc">Arc</button>
        <button data-tool="select">Select</button>
        <button data-tool="decor">Decor</button>
        <button data-tool="area">Area</button>
        <button data-tool="separator">Separator</button>
      </div>
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="edit">Edit</button>
        <button class="mode-btn" data-mode="preview">Preview</button>
      </div>
      <div id="export-group">
        <button data-action="save-json">Save JSON</button>
        <button data-action="load-json">Load JSON</button>
        <button data-action="export-svg">Export SVG</button>
        <button data-action="export-png">Export PNG</button>
        <button id="help-btn" title="Keyboard shortcuts (?)">?</button>
      </div>
    </div>

    <div id="workspace">

      <div id="panel-left">
        <section id="layer-panel">
          <div class="panel-title">Layers</div>
          <ul class="panel-list"></ul>
        </section>
        <section id="level-panel">
          <div class="panel-title">Levels</div>
          <ul class="panel-list"></ul>
        </section>
        <section id="area-panel">
          <div class="panel-title">Areas</div>
          <ul class="panel-list"></ul>
        </section>
      </div>

      <div id="canvas-container">
        <canvas id="map-canvas"></canvas>
      </div>

      <div id="panel-right">
        <section id="inspector">
          <div class="panel-title">Inspector</div>
          <p class="panel-placeholder">Select an entity</p>
        </section>
        <section id="texture-panel">
          <div class="panel-title">Texture</div>
          <div class="swatches"></div>
        </section>
        <section id="element-panel">
          <div class="panel-title">Wall Elements</div>
          <p id="element-panel-hint" class="panel-placeholder">Select a wall to add elements (door, window, opening…)</p>
          <ul class="panel-list"></ul>
        </section>
      </div>

    </div>

    <div id="statusbar">
      <span id="coords">x: 0, y: 0</span>
      <span class="statusbar-sep">|</span>
      <label class="statusbar-label" for="zoom-input">Zoom</label>
      <input id="zoom-input" type="text" value="100%" title="Zoom (ex: 150%)">
      <button id="zoom-reset" title="Reset zoom to 100%">Reset</button>
      <button id="fit-btn" title="Fit view to map content">Fit</button>
      <span class="statusbar-sep">|</span>
      <label class="statusbar-label" for="grid-size-input">Grid</label>
      <input id="grid-size-input" type="range" min="16" max="128" step="8" value="64" title="Grid size">
      <span id="grid-size-value">64px</span>
      <span class="statusbar-sep">|</span>
      <span id="active-tool">No tool</span>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
